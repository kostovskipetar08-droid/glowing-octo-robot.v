<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { background: #2b1d12 url('https://www.transparenttextures.com/patterns/dark-wood.png'); color: #f5e6cc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        #gate { position: fixed; top:0; left:0; width:100%; height:100%; background: #1e120c; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { border: 3px solid #4a2e1b; background: #362215 url('https://www.transparenttextures.com/patterns/wood-pattern.png'); padding: 20px; border-radius: 6px; width: 300px; text-align: center; }
        #app { display: none; width: 100%; max-width: 400px; padding: 10px; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; border: 5px solid #4a2e1b; }
        .sq { width: 100%; padding-top: 100%; position: relative; }
        .light { background: #e6d5bc; } .dark { background: #8c5a36; }
        .p { position: absolute; top:0; left:0; width:100%; height:100%; cursor: pointer; }
        .btn { background: #5c3a21; color: #fff; border: 2px solid #7c5233; padding: 10px; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gate">
        <div class="box">
            <input type="password" id="k" placeholder="Password" style="width:100%; padding:8px;">
            <button class="btn" onclick="check()">UNLOCK</button>
        </div>
    </div>

    <div id="app">
        <div id="board"></div>
        <button class="btn" onclick="reset()">RESET BOARD</button>
    </div>

    <script>
        var game = new Chess();
        var selected = null;

        function check() {
            if(document.getElementById('k').value === "pasvord.sah.otvaranja.") {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                draw();
            }
        }

        function draw() {
            var b = document.getElementById('board');
            b.innerHTML = '';
            for(var i=0; i<64; i++) {
                var s = document.createElement('div');
                var r = Math.floor(i/8), c = i%8;
                s.className = 'sq ' + ((r+c)%2===0 ? 'light' : 'dark');
                s.dataset.s = String.fromCharCode(97+c) + (8-r);
                s.onclick = function() { move(this.dataset.s); };
                b.appendChild(s);
            }
            updatePieces();
        }

        function move(sq) {
            if(selected) {
                game.move({from: selected, to: sq, promotion: 'q'});
                selected = null;
                updatePieces();
            } else { selected = sq; }
        }

        function reset() { game.reset(); updatePieces(); }

        function updatePieces() {
            document.querySelectorAll('.sq').forEach(s => {
                s.innerHTML = '';
                var p = game.get(s.dataset.s);
                if(p) {
                    var img = document.createElement('img');
                    img.src = 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg'.replace('plt', p.type+(p.color==='w'?'l':'d'));
                    img.className = 'p';
                    s.appendChild(img);
                }
            });
        }
    </script>
</body>
</html>
