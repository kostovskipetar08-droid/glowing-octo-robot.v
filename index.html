<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Openings Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }

        /* Gate Styles */
        #gate-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 9999; }
        .terminal-box { border: 2px solid #00ff00; padding: 20px; background: #050505; text-align: center; border-radius: 5px; width: 90%; max-width: 350px; }
        input[type="password"] { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 10px; margin-top: 15px; width: 100%; text-align: center; font-size: 16px; }
        button { background: #00ff00; color: #000; border: none; padding: 10px; margin-top: 10px; font-weight: bold; cursor: pointer; width: 100%; }

        /* Board & Layout */
        #main-app { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 15px; margin-top: 10px; }
        #chessboard { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; aspect-ratio: 1 / 1; border: 8px solid #5c3a21; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .square { display: flex; justify-content: center; align-items: center; position: relative; }
        .light-square { background-color: #eadeca; background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); }
        .dark-square { background-color: #b8860b; background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); }
        .square.selected { outline: 3px solid #00ff00; outline-offset: -3px; }
        .piece { width: 90%; height: 90%; cursor: pointer; z-index: 10; }

        /* Terminal Display */
        .display-panel { border: 1px solid #00ff00; background: #050505; padding: 15px; border-radius: 5px; }
        .status-title { font-size: 14px; text-transform: uppercase; border-bottom: 1px dashed #00ff00; margin-bottom: 5px; }
        #opening-name { font-size: 18px; font-weight: bold; color: #ffffff; margin-bottom: 10px; }
        #move-log { font-size: 13px; color: #00cc00; max-height: 80px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="terminal-box">
            <h3>SECURE TERMINAL</h3>
            <input type="password" id="passcode" placeholder="ENTER KEY">
            <button onclick="checkKey()">INITIALIZE</button>
        </div>
    </div>

    <div id="main-app">
        <div id="chessboard"></div>
        <div class="display-panel">
            <div class="status-title">> OPENING DETECTED</div>
            <div id="opening-name">Starting Position</div>
            <div class="status-title">> MOVES</div>
            <div id="move-log">1. ...</div>
            <button onclick="resetTrainer()" style="background: transparent; color: #00ff00; border: 1px solid #00ff00; margin-top: 10px;">RESET BOARD</button>
        </div>
    </div>

    <script>
        const ACCESS_KEY = "пасворд.шах.отваранја."; // CHANGE THIS TO YOUR PASSWORD
        const chess = new Chess();
        let selectedSquare = null;

        // Custom database lines mapped exactly to match chess.history() patterns
        const openingBook = {
            "e4": "King's Pawn Opening",
            "e4 c5": "Sicilian Defense",
            "e4 c5 Nf3 d6 d4 cxd4 Nxd4 Nf6 Nc3 g6": "Sicilian Defense: Dragon Variation 🐉",
            "d4": "Queen's Pawn Opening",
            "d4 d5 Nf3 Nf6 Bf4": "London System",
            "d4 f5": "Dutch Defense",
            "d4 d5 c4": "Queen's Gambit"
        };

        function checkKey() {
            if (document.getElementById("passcode").value === ACCESS_KEY) {
                document.getElementById("gate-screen").style.display = "none";
                document.getElementById("main-app").style.display = "flex";
                createBoard();
            } else { alert("ACCESS DENIED"); }
        }

        function createBoard() {
            const boardElement = document.getElementById("chessboard");
            boardElement.innerHTML = "";
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement("div");
                    const squareName = String.fromCharCode(97 + col) + (8 - row);
                    square.classList.add("square", (row + col) % 2 === 0 ? "light-square" : "dark-square");
                    square.dataset.square = squareName;
                    square.addEventListener("click", () => handleSquareClick(squareName));
                    boardElement.appendChild(square);
                }
            }
            updatePieces();
        }

        function handleSquareClick(sq) {
            if (selectedSquare === null) {
                if (chess.get(sq)) { 
                    selectedSquare = sq; 
                    document.querySelector(`[data-square="${sq}"]`).classList.add("selected");
                }
            } else {
                document.querySelectorAll(".square").forEach(s => s.classList.remove("selected"));
                chess.move({ from: selectedSquare, to: sq, promotion: 'q' });
                selectedSquare = null;
                updatePieces();
            }
        }

        function updatePieces() {
            document.querySelectorAll(".square").forEach(sq => {
                sq.innerHTML = "";
                const piece = chess.get(sq.dataset.square);
                if (piece) {
                    const img = document.createElement("img");
                    img.src = `https://upload.wikimedia.org/wikipedia/commons/${piece.color === 'w' ? '4/42/Chess_klt45.svg' : 'f/f0/Chess_kdt45.svg'}`.replace('k', piece.type);
                    img.classList.add("piece");
                    sq.appendChild(img);
                }
            });
            updateStats();
        }

        function updateStats() {
            const san = chess.history().join(" ");
            
            // Check for longest matching string prefix in database
            let currentLine = "Custom Variation / Unknown Line";
            if (openingBook[san]) {
                currentLine = openingBook[san];
            } else {
                // Check if our current path starts with a major line prefix
                for (let key in openingBook) {
                    if (san.startsWith(key)) {
                        currentLine = openingBook[key];
                    }
                }
            }
            
            if (san === "") currentLine = "Starting Position";

            document.getElementById("opening-name").innerText = currentLine;
            document.getElementById("move-log").innerText = san || "1. ...";
        }

        function resetTrainer() { 
            chess.reset(); 
            selectedSquare = null;
            document.querySelectorAll(".square").forEach(s => s.classList.remove("selected"));
            updatePieces(); 
        }
    </script>
</body>
</html>
