<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Wooden Openings Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #2b1d12; 
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            color: #f5e6cc; 
            font-family: 'Georgia', serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 10px; 
        }

        #gate-screen { display: flex; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #1e120c; z-index: 9999; }
        .wooden-box { border: 4px solid #5c3a21; background-color: #3d2516; padding: 25px; text-align: center; border-radius: 8px; width: 90%; max-width: 350px; }
        .wood-btn { background-color: #5c3a21; color: #f5e6cc; border: 2px solid #7c5233; padding: 12px; margin-top: 15px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 4px; }

        #main-app { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 12px; margin-top: 5px; }
        #chessboard { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); width: 100%; border: 10px solid #4a2e1b; }
        .square { display: flex; justify-content: center; align-items: center; position: relative; width: 100%; }
        .square::before { content: ""; display: block; padding-top: 100%; }
        .light-square { background-color: #e6d5bc; }
        .dark-square { background-color: #8c5a36; }
        .square.selected { outline: 3px solid #ffcc66; outline-offset: -3px; }
        .piece { position: absolute; width: 88%; height: 88%; cursor: pointer; z-index: 10; }

        .display-panel { border: 3px solid #4a2e1b; background-color: #362215; padding: 15px; border-radius: 6px; }
        .status-title { font-size: 13px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #5c3a21; margin-bottom: 6px; color: #cca474; }
        #opening-name { font-size: 18px; font-weight: bold; color: #ffffff; margin-bottom: 12px; }
        select { width: 100%; padding: 10px; background-color: #1e120c; color: #f5e6cc; border: 2px solid #5c3a21; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="wooden-box">
            <h3>WOODEN TERMINAL</h3>
            <input type="password" id="passcode" placeholder="ENTER ACCESS KEY">
            <button class="wood-btn" onclick="checkKey()">INITIALIZE</button>
        </div>
    </div>

    <div id="main-app">
        <div id="chessboard"></div>
        <div class="display-panel">
            <div class="status-title">> SYSTEM STATUS</div>
            <div id="opening-name">Starting Position</div>
            
            <div id="bot-menu">
                <label>> SELECT OPPONENT BOT</label>
                <select id="bot-level">
                    <option value="none">Practice Alone (Sandbox)</option>
                    <option value="beginner">Beginner Bot [600 ELO]</option>
                    <option value="intermediate">Intermediate Bot [1200 ELO]</option>
                    <option value="advanced">Advanced Bot [2100 ELO]</option>
                </select>
            </div>

            <button class="wood-btn" onclick="resetTrainer()">RESET CLASSIC BOARD</button>
        </div>
    </div>

    <script>
        const ACCESS_KEY = "пасворд.шах.отваранја."; 
        const chess = new Chess();
        let selectedSquare = null;
        const openings = { "e4": "King's Pawn Opening", "e4 e5": "Open Game" };

        function checkKey() {
            if (document.getElementById("passcode").value === ACCESS_KEY) {
                document.getElementById("gate-screen").style.display = "none";
                document.getElementById("main-app").style.display = "flex";
                createBoard();
            } else { alert("ACCESS DENIED"); }
        }

        function createBoard() {
            const boardElement = document.getElementById("chessboard");
            boardElement.innerHTML = "";
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement("div");
                    const squareName = String.fromCharCode(97 + col) + (8 - row);
                    square.classList.add("square", (row + col) % 2 === 0 ? "light-square" : "dark-square");
                    square.dataset.square = squareName;
                    square.addEventListener("click", () => handleSquareClick(squareName));
                    boardElement.appendChild(square);
                }
            }
            updateBoardState();
        }

        function handleSquareClick(sq) {
            if (selectedSquare === null) {
                if (chess.get(sq) && chess.get(sq).color === chess.turn()) { 
                    selectedSquare = sq; 
                    document.querySelector(`[data-square="${sq}"]`).classList.add("selected");
                }
            } else {
                document.querySelectorAll(".square").forEach(s => s.classList.remove("selected"));
                chess.move({ from: selectedSquare, to: sq, promotion: 'q' });
                selectedSquare = null;
                updateBoardState();
            }
        }

        function updateBoardState() {
            document.querySelectorAll(".square").forEach(sq => {
                const existing = sq.querySelectorAll('.piece');
                existing.forEach(p => p.remove());
                const piece = chess.get(sq.dataset.square);
                if (piece) {
                    const img = document.createElement("img");
                    img.src = `https://upload.wikimedia.org/wikipedia/commons/${piece.color === 'w' ? '4/42/Chess_klt45.svg' : 'f/f0/Chess_kdt45.svg'}`;
                    img.classList.add("piece");
                    sq.appendChild(img);
                }
            });
            const hist = chess.history().join(" ");
            document.getElementById("opening-name").innerText = openings[hist] || "Classic Chess";
        }

        function resetTrainer() { 
            chess.reset();
            selectedSquare = null; 
            updateBoardState();
        }
    </script>
</body>
</html>
