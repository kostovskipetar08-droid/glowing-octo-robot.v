<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Wooden Openings Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #2b1d12; 
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            color: #f5e6cc; 
            font-family: 'Georgia', serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 10px; 
        }

        /* Fully Wooden Lockscreen Gate */
        #gate-screen { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #1e120c; 
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            z-index: 9999; 
        }
        .wooden-box { 
            border: 4px solid #5c3a21; 
            background-color: #3d2516;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            padding: 25px; 
            text-align: center; 
            border-radius: 8px; 
            width: 90%; 
            max-width: 350px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.7), inset 0 0 15px rgba(0,0,0,0.5);
        }
        .wooden-box h3 {
            color: #f5e6cc;
            text-shadow: 1px 1px 2px #000;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        input[type="password"] { 
            background: #1e120c; 
            border: 2px solid #5c3a21; 
            color: #f5e6cc; 
            padding: 12px; 
            width: 100%; 
            text-align: center; 
            font-size: 16px; 
            border-radius: 4px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
            outline: none;
        }
        
        /* Master Wooden Buttons */
        .wood-btn { 
            background-color: #5c3a21; 
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            color: #f5e6cc; 
            border: 2px solid #7c5233; 
            padding: 12px; 
            margin-top: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            border-radius: 4px;
            text-shadow: 1px 1px 1px #000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }
        .wood-btn:active {
            box-shadow: 0 1px 2px rgba(0,0,0,0.4);
            transform: translateY(2px);
        }

        /* Board Container & Fixed Square Layout */
        #main-app { display: none; width: 100%; max-width: 400px; flex-direction: column; gap: 12px; margin-top: 5px; }
        
        /* Fixed: Prevents the squishing issue seen in 1781549288445.jpeg */
        #chessboard { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            grid-template-rows: repeat(8, 1fr);
            width: 100%; 
            border: 10px solid #4a2e1b; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.6); 
        }

        /* Fixed: Forces individual squares to be exact 1:1 boxes regardless of scaling */
        .square { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
            width: 100%;
        }
        .square::before {
            content: "";
            display: block;
            padding-top: 100%;
        }
        
        /* Light/Dark Realistic Wood Grain Squares */
        .light-square { 
            background-color: #e6d5bc; 
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
        }
        .dark-square { 
            background-color: #8c5a36; 
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
        }
        .square.selected { outline: 3px solid #ffcc66; outline-offset: -3px; }
        
        /* Specialized Wooden Pieces Styling */
        .piece { 
            position: absolute;
            width: 88%; 
            height: 88%; 
            cursor: pointer; 
            z-index: 10; 
            filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.6));
        }

        /* Wooden Dashboard Display Panels */
        .display-panel { 
            border: 3px solid #4a2e1b; 
            background-color: #362215; 
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            padding: 15px; 
            border-radius: 6px; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6), 0 4px 10px rgba(0,0,0,0.4);
        }
        .status-title { 
            font-size: 13px; 
            font-weight: bold;
            text-transform: uppercase; 
            border-bottom: 1px solid #5c3a21; 
            margin-bottom: 6px; 
            color: #cca474;
        }
        #opening-name { font-size: 18px; font-weight: bold; color: #ffffff; margin-bottom: 12px; text-shadow: 1px 1px 2px #000; }
        #move-log { font-family: monospace; font-size: 14px; color: #dfcbb5; max-height: 60px; overflow-y: auto; margin-bottom: 5px; }

        /* Bot Settings Selection Dropdown */
        .selector-label { font-size: 14px; color: #cca474; font-weight: bold; display: block; margin-top: 5px; }
        select {
            width: 100%;
            padding: 10px;
            background-color: #1e120c;
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            color: #f5e6cc;
            border: 2px solid #5c3a21;
            border-radius: 4px;
            font-family: inherit;
            font-size: 15px;
            margin-top: 5px;
            outline: none;
        }
    </style>
</head>
<body>

    <!-- SECURE WOODEN LOCKSCREEN -->
    <div id="gate-screen">
        <div class="wooden-box">
            <h3>WOODEN TERMINAL</h3>
            <input type="password" id="passcode" placeholder="ENTER ACCESS KEY">
            <button class="wood-btn" onclick="checkKey()">INITIALIZE</button>
        </div>
    </div>

    <!-- MAIN TRAINING ENGINE INTERFACE -->
    <div id="main-app">
        <div id="chessboard"></div>
        
        <div class="display-panel">
            <div class="status-title">> SYSTEM STATUS</div>
            <div id="opening-name">Starting Position</div>
            
            <div class="status-title">> MOVES RECORDED</div>
            <div id="move-log">1. ...</div>

            <!-- BOT SELECTOR MENU -->
            <label class="selector-label" for="bot-level">> SELECT OPPONENT BOT</label>
            <select id="bot-level">
                <option value="none">Practice Alone (Sandbox Mode)</option>
                <option value="beginner">Beginner Bot [600 ELO]</option>
                <option value="intermediate">Intermediate Bot [1200 ELO]</option>
                <option value="advanced">Advanced Bot [2100 ELO]</option>
            </select>

            <button class="wood-btn" onclick="resetTrainer()" style="margin-top: 15px; padding: 8px;">RESET WOODEN BOARD</button>
        </div>
    </div>

    <script>
        const ACCESS_KEY = "пасворд.шах.отваранја."; 
        const chess = new Chess();
        let selectedSquare = null;

        const openingBook = {
            "e4": "King's Pawn Opening",
            "e4 c5": "Sicilian Defense",
            "e4 c5 Nf3 d6 d4 cxd4 Nxd4 Nf6 Nc3 g6": "Sicilian Defense: Dragon Variation 🐉",
            "d4": "Queen's Pawn Opening",
            "d4 d5 Nf3 Nf6 Bf4": "The London System",
            "d4 f5": "Dutch Defense",
            "d4 d5 c4": "Queen's Gambit"
        };

        const pieceImages = {
            'p': 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg',
            'r': 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
            'n': 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg',
            'b': 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg',
            'q': 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg',
            'k': 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg',
            'P': 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg',
            'R': 'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
            'N': 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
            'B': 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',
            'Q': 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg',
            'K': 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg'
        };

        function checkKey() {
            if (document.getElementById("passcode").value === ACCESS_KEY) {
                document.getElementById("gate-screen").style.display = "none";
                document.getElementById("main-app").style.display = "flex";
                createBoard();
            } else { alert("ACCESS DENIED: INCORRECT WOODEN KEY"); }
        }

        function createBoard() {
            const boardElement = document.getElementById("chessboard");
            boardElement.innerHTML = "";
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement("div");
                    const squareName = String.fromCharCode(97 + col) + (8 - row);
                    square.classList.add("square", (row + col) % 2 === 0 ? "light-square" : "dark-square");
                    square.dataset.square = squareName;
                    square.addEventListener("click", () => handleSquareClick(squareName));
                    boardElement.appendChild(square);
                }
            }
            updatePieces();
        }

        function handleSquareClick(sq) {
            if (chess.turn() === 'b' && document.getElementById("bot-level").value !== "none") return;

            if (selectedSquare === null) {
                if (chess.get(sq) && chess.get(sq).color === chess.turn()) { 
                    selectedSquare = sq; 
                    document.querySelector(`[data-square="${sq}"]`).classList.add("selected");
                }
            } else {
                document.querySelectorAll(".square").forEach(s => s.classList.remove("selected"));
                const move = chess.move({ from: selectedSquare, to: sq, promotion: 'q' });
                selectedSquare = null;
                updatePieces();

                if (move && !chess.game_over()) {
                    if (document.getElementById("bot-level").value !== "none") {
                        setTimeout(triggerBotMove, 300);
                    }
                }
            }
        }

        function triggerBotMove() {
            const mode = document.getElementById("bot-level").value;
            const moves = chess.moves();
            if (moves.length === 0) return;

            if (mode === "beginner") {
                const randomMove = moves[Math.floor(Math.random() * moves.length)];
                chess.move(randomMove);
                updatePieces();
                return;
            }

            const depth = (mode === "advanced") ? 4 : 2; 
            let bestMove = minimaxRoot(depth, true);
            
            if (bestMove) {
                chess.move(bestMove);
            } else {
                chess.move(moves[0]);
            }
            updatePieces();
        }

        function minimaxRoot(depth, isMaximizingPlayer) {
            const moves = chess.moves();
            let bestMoveValue = -99999;
            let bestMove = null;

            for (let i = 0; i < moves.length; i++) {
                const move = moves[i];
                chess.move(move);
                const value = minimax(depth - 1, -100000, 100000, !isMaximizingPlayer);
                chess.pop();
                if (value >= bestMoveValue) {
                    bestMoveValue = value;
                    bestMove = move;
                }
            }
            return bestMove;
        }

        function minimax(depth, alpha, beta, isMaximizingPlayer) {
            if (depth === 0 || chess.game_over()) {
                return evaluatePosition();
            }

            const moves = chess.moves();
            if (isMaximizingPlayer) {
                let maxEval = -99999;
                for (let i = 0; i < moves.length; i++) {
                    chess.move(moves[i]);
                    let evaluation = minimax(depth - 1, alpha, beta, false);
                    chess.pop();
                    maxEval = Math.max(maxEval, evaluation);
                    alpha = Math.max(alpha, evaluation);
                    if (beta <= alpha) break;
                }
                return maxEval;
            } else {
                let minEval = 99999;
                for (let i = 0; i < moves.length; i++) {
                    chess.move(moves[i]);
                    let evaluation = minimax(depth - 1, alpha, beta, true);
                    chess.pop();
                    minEval = Math.min(minEval, evaluation);
                    beta = Math.min(beta, evaluation);
                    if (beta <= alpha) break;
                }
                return minEval;
            }
        }

        function evaluatePosition() {
            let score = 0;
            const values = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 9000 };
            
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const sqName = String.fromCharCode(97 + j) + (8 - i);
                    const piece = chess.get(sqName);
                    if (piece) {
                        let val = values[piece.type];
                        score += (piece.color === 'b') ? val : -val;
                    }
                }
            }
            return score;
        }

        function updatePieces() {
            document.querySelectorAll(".square").forEach(sq => {
                // Clear out everything except the layout spacing element
                const existingPieces = sq.querySelectorAll('.piece');
                existingPieces.forEach(p => p.remove());

                const piece = chess.get(sq.dataset.square);
                if (piece) {
                    const img = document.createElement("img");
                    const key = piece.color === 'w' ? piece.type.toUpperCase() : piece.type.toLowerCase();
                    img.src = pieceImages[key];
                    img.classList.add("piece");
                    
                    if (piece.color === 'w') {
                        img.style.filter = "sepia(0.6) brightness(1.2) contrast(0.9) drop-shadow(1px 2px 2px rgba(0,0,0,0.5))";
                    } else {
                        img.style.filter = "sepia(0.9) brightness(0.4) contrast(1.2) drop-shadow(1px 2px 2px rgba(0,0,0,0.7))";
                    }
                    sq.appendChild(img);
                }
            });
            updateStats();
        }

        function updateStats() {
            const san = chess.history().join(" ");
            let currentLine = "Custom Line / Engine Battle";
            
            if (openingBook[san]) {
                currentLine = openingBook[san];
            } else {
                for (let key in openingBook) {
                    if (san.startsWith(key)) {
                        currentLine = openingBook[key];
                    }
                }
            }
            
            if (san === "") currentLine = "Starting Position";

            document.getElementById("opening-name").innerText = currentLine;
            document.getElementById("move-log").innerText = san || "1. ...";
        }

        function resetTrainer() { 
            chess.reset(); 
            selectedSquare = null;
            document.querySelectorAll(".square").forEach(s => s.classList.remove("selected"));
            updatePieces(); 
        }
    </script>
</body>
</html>
